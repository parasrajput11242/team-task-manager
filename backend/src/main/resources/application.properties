# Prepend jdbc: to the dynamic variable and keep a clean fallback
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Essential for Railway to bind to the correct internal port
server.port=${PORT:8080}

spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
